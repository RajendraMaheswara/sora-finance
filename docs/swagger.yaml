paths:
  /monthly-summaries:
    get:
      description: Mengembalikan daftar semua ringkasan keuangan bulanan
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.MonthlySummary'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get all monthly summaries
      tags:
      - MonthlySummaries
  /monthly-summaries/{id}:
    get:
      description: Mengembalikan satu ringkasan keuangan bulanan berdasarkan ID
      parameters:
      - description: UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MonthlySummary'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get monthly summary by ID
      tags:
      - MonthlySummaries
  /stores:
    get:
      description: Mengembalikan daftar semua toko
      produces:
      - application/json
      responses:
